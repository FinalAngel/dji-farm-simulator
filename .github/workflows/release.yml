name: Release

# Two ways to cut a release:
#   1. Push a version tag:        git tag v0.2.0 && git push origin v0.2.0
#   2. Run this workflow manually (Actions → Release → Run workflow) and enter a
#      version like v0.2.0 — it creates and pushes the tag for you.
#
# Either way it builds installers for macOS, Windows and Linux and publishes a
# GitHub Release with all of them attached.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create and release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

# Don't run two releases for the same version at once; let an in-flight one finish.
concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Resolve the version tag. On manual dispatch, create and push it first.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag list to detect duplicates

      - name: Resolve version (and tag on manual dispatch)
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            case "$VERSION" in
              v*) ;;
              *) echo "::error::Version must start with 'v' (e.g. v0.2.0), got '$VERSION'"; exit 1 ;;
            esac
            if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
              echo "::error::Tag $VERSION already exists"; exit 1
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "$VERSION"
            git push origin "$VERSION"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

  # Build + package the installers on each OS (current-OS targets per electron-builder).
  build:
    needs: prepare
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    env:
      # No signing certs in CI → build unsigned rather than failing on mac.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }} # the (possibly just-created) tag

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main + preload
        run: npm run build

      - name: Package installers (no auto-publish — the release job does that)
        run: npx --no-install electron-builder --publish never

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: ignore

  # Gather every OS's installers and publish one GitHub Release with them attached.
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: installers-*
          merge-multiple: true

      - name: List collected files
        run: ls -lR dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          draft: false
          # Tags containing a hyphen (e.g. v0.2.0-beta.1) are treated as pre-releases.
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/**
