name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build installers
# for macOS, Windows and Linux and attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  dist:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package installers
        run: npm run dist
        env:
          # electron-builder publishes to the release when a token is available.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
          if-no-files-found: ignore
