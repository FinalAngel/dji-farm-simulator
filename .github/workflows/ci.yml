name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Typecheck, logic tests, build, and a headless boot — the fast feedback loop.
  test:
    name: Typecheck · test · build · boot (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Logic tests (coverage, exports, geolocation, SRT, mock)
        run: npm test

      - name: Build (main + preload + renderer)
        run: npm run build

      - name: Headless boot smoke test
        run: xvfb-run -a npm start
        env:
          LITOX1_SMOKE_EXIT: "1"

  # Make sure it also compiles on macOS and Windows.
  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
